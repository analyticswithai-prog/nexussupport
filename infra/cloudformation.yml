AWSTemplateFormatVersion: '2010-09-09'
Description: NexusSupport - Multi-Tenant AI Customer Support
Parameters:
  AppName: {Type: String, Default: nexussupport}
  Environment: {Type: String, Default: production}
  JWTSecret: {Type: String, NoEcho: true}
  AnthropicKey: {Type: String, NoEcho: true}
Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties: {CidrBlock: 10.0.0.0/16, EnableDnsHostnames: true, EnableDnsSupport: true}
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties: {VpcId: !Ref VPC, CidrBlock: 10.0.1.0/24, AvailabilityZone: !Select [0, !GetAZs ''], MapPublicIpOnLaunch: true}
  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties: {VpcId: !Ref VPC, CidrBlock: 10.0.2.0/24, AvailabilityZone: !Select [1, !GetAZs ''], MapPublicIpOnLaunch: true}
  IGW: {Type: AWS::EC2::InternetGateway}
  IGWAttach: {Type: AWS::EC2::VPCGatewayAttachment, Properties: {VpcId: !Ref VPC, InternetGatewayId: !Ref IGW}}
  ECR:
    Type: AWS::ECR::Repository
    Properties: {RepositoryName: !Sub '${AppName}-backend'}
  Cluster:
    Type: AWS::ECS::Cluster
    Properties: {ClusterName: !Sub '${AppName}-cluster'}
  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Statement: [{Effect: Allow, Principal: {Service: ecs-tasks.amazonaws.com}, Action: sts:AssumeRole}]
      ManagedPolicyArns: [arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy]
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${AppName}-frontend-${AWS::AccountId}'
      WebsiteConfiguration: {IndexDocument: index.html, ErrorDocument: index.html}
  CloudFront:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: S3
            DomainName: !Sub '${S3Bucket}.s3-website-${AWS::Region}.amazonaws.com'
            CustomOriginConfig: {HTTPPort: 80, OriginProtocolPolicy: http-only}
        DefaultCacheBehavior:
          TargetOriginId: S3
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
        CustomErrorResponses:
          - {ErrorCode: 404, ResponseCode: 200, ResponsePagePath: /index.html}
Outputs:
  ECRRepo: {Value: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${AppName}-backend'}
  FrontendBucket: {Value: !Ref S3Bucket}
  CloudFrontURL: {Value: !Sub 'https://${CloudFront.DomainName}'}
